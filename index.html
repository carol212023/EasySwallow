<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友膳食嚥家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            ChevronRight, Menu, X, BookOpen, Utensils, GraduationCap, 
            ShoppingBag, Phone, Heart, Star, CheckCircle, Clock, ExternalLink 
        } = lucide;

        const TEXTURE_LEVELS = [
            { id: 7, name: '普通飲食', color: 'bg-black', desc: '不限質地' },
            { id: 6, name: '軟質易製', color: 'bg-blue-400', desc: '可用叉子輕易壓斷' },
            { id: 5, name: '細碎及濕軟', color: 'bg-orange-400', desc: '米粒大小，不需咀嚼' },
            { id: 4, name: '泥狀飲食', color: 'bg-green-500', desc: '像馬鈴薯泥，無顆粒' },
        ];

        const COURSES = [
            {
                title: "質地飲食入門班：在家也能做美味",
                date: "2024/05/20 (一)",
                location: "台北市大安區教學中心",
                price: "NT$ 1,200",
                image: "https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&q=80&w=800"
            },
            {
                title: "進階吞嚥照顧：IDDSI 分級實作課",
                date: "2024/06/15 (六)",
                location: "線上直播課程",
                price: "NT$ 800",
                image: "https://images.unsplash.com/photo-1576091160550-2173dad99901?auto=format&fit=crop&q=80&w=800"
            }
        ];

        const RECIPES = [
            {
                title: "銀髮舒心燉肉 (IDDSI 6)",
                tag: "高蛋白",
                image: "https://images.unsplash.com/photo-1547592166-23ac45744acd?auto=format&fit=crop&q=80&w=800"
            },
            {
                title: "南瓜濃湯慕斯 (IDDSI 4)",
                tag: "好吞嚥",
                image: "https://images.unsplash.com/photo-1476718406336-bb5a9690ee2a?auto=format&fit=crop&q=80&w=800"
            }
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            useEffect(() => {
                window.scrollTo(0, 0);
            }, [activeTab]);

            useEffect(() => {
                lucide.createIcons();
            });

            const Navigation = () => (
                <nav className="bg-white shadow-md sticky top-0 z-50">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between h-20">
                            <div className="flex items-center">
                                <div className="flex-shrink-0 flex items-center cursor-pointer" onClick={() => setActiveTab('home')}>
                                    <div className="bg-green-600 p-2 rounded-lg mr-2">
                                        <Utensils className="text-white" size={24} />
                                    </div>
                                    <span className="text-2xl font-bold text-gray-800">友膳食嚥家</span>
                                </div>
                            </div>
                            <div className="hidden md:flex items-center space-x-8">
                                <button onClick={() => setActiveTab('home')} className={`text-lg font-medium ${activeTab === 'home' ? 'text-green-600' : 'text-gray-600 hover:text-green-600'}`}>首頁</button>
                                <button onClick={() => setActiveTab('education')} className={`text-lg font-medium ${activeTab === 'education' ? 'text-green-600' : 'text-gray-600 hover:text-green-600'}`}>衛教知識</button>
                                <button onClick={() => setActiveTab('recipes')} className={`text-lg font-medium ${activeTab === 'recipes' ? 'text-green-600' : 'text-gray-600 hover:text-green-600'}`}>美味食譜</button>
                                <button onClick={() => setActiveTab('courses')} className={`text-lg font-medium ${activeTab === 'courses' ? 'text-green-600' : 'text-gray-600 hover:text-green-600'}`}>實體課程</button>
                                <button onClick={() => setActiveTab('shop')} className="bg-orange-500 text-white px-6 py-2 rounded-full font-bold hover:bg-orange-600 transition-colors">線上購買</button>
                            </div>
                            <div className="md:hidden flex items-center">
                                <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-gray-600 p-2">
                                    {isMenuOpen ? <X size={32} /> : <Menu size={32} />}
                                </button>
                            </div>
                        </div>
                    </div>
                    {isMenuOpen && (
                        <div className="md:hidden bg-white border-t border-gray-100">
                            <div className="px-2 pt-2 pb-3 space-y-1">
                                <button onClick={() => { setActiveTab('home'); setIsMenuOpen(false); }} className="block w-full text-left px-4 py-4 text-xl text-gray-700 border-b">首頁</button>
                                <button onClick={() => { setActiveTab('education'); setIsMenuOpen(false); }} className="block w-full text-left px-4 py-4 text-xl text-gray-700 border-b">衛教知識</button>
                                <button onClick={() => { setActiveTab('recipes'); setIsMenuOpen(false); }} className="block w-full text-left px-4 py-4 text-xl text-gray-700 border-b">美味食譜</button>
                                <button onClick={() => { setActiveTab('courses'); setIsMenuOpen(false); }} className="block w-full text-left px-4 py-4 text-xl text-gray-700 border-b">實體課程</button>
                                <button onClick={() => { setActiveTab('shop'); setIsMenuOpen(false); }} className="block w-full text-center mt-4 mx-4 py-4 bg-orange-500 text-white rounded-xl font-bold">線上購買</button>
                            </div>
                        </div>
                    )}
                </nav>
            );

            const Footer = () => (
                <footer className="bg-gray-800 text-white pt-12 pb-8">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-12 border-b border-gray-700 pb-12">
                            <div>
                                <h3 className="text-2xl font-bold mb-4">友膳食嚥家</h3>
                                <p className="text-gray-400 text-lg leading-relaxed">專注於推廣高齡質地飲食，我們致力於讓每一位長輩都能吃得安全、營養、更要美味。</p>
                            </div>
                            <div>
                                <h4 className="text-xl font-bold mb-4">快速連結</h4>
                                <ul className="space-y-3 text-lg text-gray-400">
                                    <li className="hover:text-white cursor-pointer" onClick={() => setActiveTab('education')}>質地分級介紹</li>
                                    <li className="hover:text-white cursor-pointer" onClick={() => setActiveTab('recipes')}>精選食譜專區</li>
                                    <li className="hover:text-white cursor-pointer" onClick={() => setActiveTab('courses')}>最新課程資訊</li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="text-xl font-bold mb-4">聯繫我們</h4>
                                <div className="space-y-4">
                                    <div className="flex items-center">
                                        <Phone className="mr-3 text-green-400" size={20} />
                                        <span className="text-lg">02-1234-5678</span>
                                    </div>
                                    <p className="text-lg text-gray-400">服務時間：週一至週五 09:00 - 18:00</p>
                                </div>
                            </div>
                        </div>
                        <div className="mt-8 text-center text-gray-500">
                            <p>© 2024 友膳食嚥家 版權所有</p>
                        </div>
                    </div>
                </footer>
            );

            const HomeView = () => (
                <div>
                    <div className="relative bg-orange-50 py-16 md:py-24 overflow-hidden">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                            <div className="md:w-1/2">
                                <span className="inline-block bg-green-100 text-green-700 px-4 py-1 rounded-full font-bold mb-4">友善吞嚥 · 幸福入口</span>
                                <h1 className="text-4xl md:text-6xl font-black text-gray-900 leading-tight mb-6">讓長輩重拾<br /><span className="text-orange-600">「吃」的樂趣</span></h1>
                                <p className="text-xl md:text-2xl text-gray-600 mb-8 leading-relaxed">我們不只提供食品，更提供專業的質地飲食方案。<br />讓每一口飯菜，都成為尊嚴與健康的享受。</p>
                                <div className="flex flex-col sm:flex-row gap-4">
                                    <button onClick={() => setActiveTab('shop')} className="bg-orange-500 text-white px-8 py-4 rounded-xl text-xl font-bold hover:bg-orange-600 shadow-lg flex items-center justify-center"><ShoppingBag className="mr-2" /> 查看嚴選食品</button>
                                    <button onClick={() => setActiveTab('courses')} className="bg-white text-gray-800 border-2 border-gray-200 px-8 py-4 rounded-xl text-xl font-bold hover:bg-gray-50 flex items-center justify-center">報名教學課程</button>
                                </div>
                            </div>
                        </div>
                        <div className="hidden md:block absolute top-0 right-0 w-1/2 h-full">
                            <div className="h-full w-full bg-cover bg-center rounded-l-3xl" style={{ backgroundImage: 'url("https://images.unsplash.com/photo-1516714435131-44d6b64dc6a2?auto=format&fit=crop&q=80&w=1200")' }}>
                                <div className="absolute inset-0 bg-gradient-to-r from-orange-50 to-transparent"></div>
                            </div>
                        </div>
                    </div>
                    <div className="py-20 bg-white">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-16">
                                <h2 className="text-3xl md:text-4xl font-bold text-gray-900 mb-4">我們能為您做什麼？</h2>
                                <p className="text-xl text-gray-500">專業、美味、安全，是我們對質地飲食的堅持</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div className="bg-gray-50 p-8 rounded-3xl text-center hover:shadow-xl transition-shadow border-t-8 border-green-500">
                                    <div className="bg-green-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6"><GraduationCap className="text-green-600" size={32} /></div>
                                    <h3 className="text-2xl font-bold mb-4">專業實體課程</h3>
                                    <p className="text-lg text-gray-600 mb-6">針對照顧者與長輩，教授如何正確調整食材質地。</p>
                                    <button onClick={() => setActiveTab('courses')} className="text-green-600 font-bold text-lg flex items-center mx-auto">了解更多 <ChevronRight size={20} /></button>
                                </div>
                                <div className="bg-gray-50 p-8 rounded-3xl text-center hover:shadow-xl transition-shadow border-t-8 border-orange-500">
                                    <div className="bg-orange-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6"><Utensils className="text-orange-600" size={32} /></div>
                                    <h3 className="text-2xl font-bold mb-4">現成營養食譜</h3>
                                    <p className="text-lg text-gray-600 mb-6">符合 IDDSI 國際標準的精選食譜。</p>
                                    <button onClick={() => setActiveTab('recipes')} className="text-orange-600 font-bold text-lg flex items-center mx-auto">瀏覽食譜 <ChevronRight size={20} /></button>
                                </div>
                                <div className="bg-gray-50 p-8 rounded-3xl text-center hover:shadow-xl transition-shadow border-t-8 border-blue-500">
                                    <div className="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6"><ShoppingBag className="text-blue-600" size={32} /></div>
                                    <h3 className="text-2xl font-bold mb-4">質地友善食品</h3>
                                    <p className="text-lg text-gray-600 mb-6">嚴選現成食品，開袋即食。</p>
                                    <button onClick={() => setActiveTab('shop')} className="text-blue-600 font-bold text-lg flex items-center mx-auto">立即購買 <ChevronRight size={20} /></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const EducationView = () => (
                <div className="py-16 bg-white min-h-screen">
                    <div className="max-w-4xl mx-auto px-4 text-center">
                        <h1 className="text-4xl font-black text-gray-900 mb-4">質地飲食衛教專區</h1>
                        <div className="space-y-4 mt-8">
                            {TEXTURE_LEVELS.map(level => (
                                <div key={level.id} className="flex items-center bg-gray-50 p-6 rounded-xl shadow-sm">
                                    <div className={`${level.color} text-white w-12 h-12 rounded-lg flex items-center justify-center font-bold text-xl mr-4`}>{level.id}</div>
                                    <div className="text-left">
                                        <h4 className="text-xl font-bold text-gray-800">{level.name}</h4>
                                        <p className="text-gray-500">{level.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const RecipesView = () => (
                <div className="py-16 bg-gray-50 min-h-screen">
                    <div className="max-w-7xl mx-auto px-4">
                        <h1 className="text-4xl font-black text-center mb-12">美味食譜專區</h1>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {RECIPES.map((recipe, idx) => (
                                <div key={idx} className="bg-white rounded-3xl overflow-hidden shadow-lg">
                                    <img src={recipe.image} alt={recipe.title} className="w-full h-64 object-cover" />
                                    <div className="p-8">
                                        <h3 className="text-2xl font-bold mb-4">{recipe.title}</h3>
                                        <button className="w-full py-3 bg-orange-500 text-white rounded-xl font-bold">查看食譜</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const CoursesView = () => (
                <div className="py-16 bg-white min-h-screen">
                    <div className="max-w-7xl mx-auto px-4">
                        <h1 className="text-4xl font-black text-center mb-12">實體教學課程</h1>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                            {COURSES.map((course, idx) => (
                                <div key={idx} className="flex flex-col md:flex-row bg-orange-50 rounded-3xl overflow-hidden shadow-md">
                                    <img src={course.image} alt={course.title} className="md:w-1/2 h-64 object-cover" />
                                    <div className="p-8 md:w-1/2 flex flex-col justify-between">
                                        <h3 className="text-2xl font-bold mb-4">{course.title}</h3>
                                        <div className="text-3xl font-black text-orange-600 mb-6">{course.price}</div>
                                        <button className="w-full bg-orange-500 text-white py-4 rounded-xl font-bold">立即報名</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const ShopView = () => (
                <div className="py-16 bg-gray-50 min-h-screen flex items-center justify-center">
                    <div className="bg-white p-12 rounded-3xl shadow-xl text-center max-w-xl">
                        <ShoppingBag className="mx-auto text-orange-400 mb-6" size={80} />
                        <h2 className="text-3xl font-bold mb-4">線上商城準備中</h2>
                        <p className="text-xl text-gray-600">即將推出專業質地飲食產品，敬請期待！</p>
                    </div>
                </div>
            );

            return (
                <div className="font-sans text-gray-900 bg-gray-50">
                    <Navigation />
                    <main>
                        {activeTab === 'home' && <HomeView />}
                        {activeTab === 'education' && <EducationView />}
                        {activeTab === 'recipes' && <RecipesView />}
                        {activeTab === 'courses' && <CoursesView />}
                        {activeTab === 'shop' && <ShopView />}
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
