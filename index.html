<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友膳食嚥家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [tab, setTab] = useState('home');

            return (
                <div className="min-h-screen bg-gray-50">
                    <nav className="bg-white shadow-md p-4 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <h1 className="text-2xl font-bold text-green-700 cursor-pointer" onClick={() => setTab('home')}>友膳食嚥家</h1>
                            <div className="space-x-4">
                                <button onClick={() => setTab('home')} className={tab === 'home' ? 'text-green-600 font-bold' : ''}>首頁</button>
                                <button onClick={() => setTab('edu')} className={tab === 'edu' ? 'text-green-600 font-bold' : ''}>衛教知識</button>
                                <button onClick={() => setTab('recipe')} className={tab === 'recipe' ? 'text-green-600 font-bold' : ''}>美味食譜</button>
                            </div>
                        </div>
                    </nav>

                    <div className="max-w-6xl mx-auto p-6">
                        {tab === 'home' && (
                            <div className="text-center py-20">
                                <h2 className="text-5xl font-black mb-6">讓長輩重拾「吃」的樂趣</h2>
                                <p className="text-xl text-gray-600 mb-10">專業個案管理師為您打造的質地飲食方案</p>
                                <div className="bg-orange-500 text-white inline-block px-10 py-4 rounded-xl font-bold text-xl shadow-lg cursor-pointer">立即查看</div>
                            </div>
                        )}

                        {tab === 'edu' && (
                            <div className="py-10">
                                <h2 className="text-3xl font-bold mb-8">質地分級 (IDDSI)</h2>
                                <div className="grid gap-4">
                                    <div className="bg-white p-6 rounded-lg shadow border-l-8 border-blue-400">
                                        <h3 className="font-bold text-xl">第 6 級：軟質易製</h3>
                                        <p>適合咬合能力稍微退化的長輩。</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-lg shadow border-l-8 border-green-500">
                                        <h3 className="font-bold text-xl">第 4 級：泥狀飲食</h3>
                                        <p>適合嚴重吞嚥困難，像馬鈴薯泥般滑順。</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'recipe' && (
                            <div className="py-10">
                                <h2 className="text-3xl font-bold mb-8">美味食譜</h2>
                                <div className="grid md:grid-cols-2 gap-8">
                                    <div className="bg-white rounded-2xl overflow-hidden shadow">
                                        <img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=500" className="w-full h-48 object-cover" />
                                        <div className="p-6">
                                            <h4 className="font-bold text-xl mb-2">銀髮舒心燉肉</h4>
                                            <p className="text-gray-500">軟嫩入味，營養滿分。</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <footer className="bg-gray-800 text-white py-10 text-center mt-20">
                        <p className="font-bold">友膳食嚥家 © 2024</p>
                        <p className="text-sm text-gray-400">專注於高齡質地飲食推廣</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
