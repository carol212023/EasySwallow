<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友膳食嚥家 - 高齡質地飲食推廣</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            // 確保每次切換分頁，圖示都能跑出來
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
                window.scrollTo(0, 0);
            }, [activeTab, isMenuOpen]);

            // 定義資料
            const TEXTURE_LEVELS = [
                { id: 7, name: '普通飲食', color: 'bg-black', desc: '不限質地，適合吞嚥功能正常者。' },
                { id: 6, name: '軟質易製', color: 'bg-blue-400', desc: '可用叉子壓斷，適合咬合稍弱者。' },
                { id: 5, name: '細碎及濕軟', color: 'bg-orange-400', desc: '米粒大小，不需咀嚼即可吞嚥。' },
                { id: 4, name: '泥狀飲食', color: 'bg-green-500', desc: '滑順無顆粒，適合嚴重吞嚥障礙。' },
            ];

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col">
                    {/* 導覽列 */}
                    <nav className="bg-white shadow-md sticky top-0 z-50 h-20 flex items-center">
                        <div className="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
                            <div className="flex items-center cursor-pointer" onClick={() => {setActiveTab('home'); setIsMenuOpen(false);}}>
                                <div className="bg-green-600 p-2 rounded-lg mr-2">
                                    <i data-lucide="utensils" className="text-white w-6 h-6"></i>
                                </div>
                                <span className="text-2xl font-bold text-gray-800">友膳食嚥家</span>
                            </div>

                            {/* 桌面選單 */}
                            <div className="hidden md:flex space-x-6 font-bold">
                                <button onClick={() => setActiveTab('home')} className={activeTab === 'home' ? 'text-green-600' : 'text-gray-500'}>首頁</button>
                                <button onClick={() => setActiveTab('edu')} className={activeTab === 'edu' ? 'text-green-600' : 'text-gray-500'}>衛教知識</button>
                                <button onClick={() => setActiveTab('recipe')} className={activeTab === 'recipe' ? 'text-green-600' : 'text-gray-500'}>美味食譜</button>
                                <button onClick={() => setActiveTab('courses')} className={activeTab === 'courses' ? 'text-green-600' : 'text-gray-500'}>實體課程</button>
                                <button onClick={() => setActiveTab('shop')} className="bg-orange-500 text-white px-4 py-1 rounded-full">線上購買</button>
                            </div>

                            {/* 手機按鈕 */}
                            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <i data-lucide={isMenuOpen ? "x" : "menu"} className="w-8 h-8 text-gray-600"></i>
                            </button>
                        </div>
                    </nav>

                    {/* 手機選單下拉 */}
                    {isMenuOpen && (
                        <div className="md:hidden bg-white border-b shadow-lg">
                            <div className="flex flex-col p-4 space-y-4 font-bold">
                                <button onClick={() => {setActiveTab('home'); setIsMenuOpen(false);}} className="text-left py-2">首頁</button>
                                <button onClick={() => {setActiveTab('edu'); setIsMenuOpen(false);}} className="text-left py-2">衛教知識</button>
                                <button onClick={() => {setActiveTab('recipe'); setIsMenuOpen(false);}} className="text-left py-2">美味食譜</button>
                                <button onClick={() => {setActiveTab('courses'); setIsMenuOpen(false);}} className="text-left py-2">實體課程</button>
                                <button onClick={() => {setActiveTab('shop'); setIsMenuOpen(false);}} className="text-orange-500 py-2">線上購買</button>
                            </div>
                        </div>
                    )}

                    {/* 主內容 */}
                    <main className="flex-grow">
                        {activeTab === 'home' && (
                            <section className="bg-orange-50 py-16 md:py-24 px-4 text-center md:text-left">
                                <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center gap-12">
                                    <div className="md:w-1/2">
                                        <h1 className="text-5xl md:text-6xl font-black text-gray-900 leading-tight mb-6">讓長輩重拾<br/><span className="text-orange-600">「吃」的樂趣</span></h1>
                                        <p className="text-xl text-gray-600 mb-10">我們不只提供食品，更提供專業的質地飲食方案。
讓每一口飯菜，都成為尊嚴與健康的享受。</p>
                                        <button onClick={() => setActiveTab('recipe')} className="bg-orange-500 text-white px-10 py-4 rounded-xl font-bold text-xl shadow-lg">瀏覽食譜</button>
                                    </div>
                                    <div className="md:w-1/2">
                                        <img src="https://images.unsplash.com/photo-1516714435131-44d6b64dc6a2?w=800" className="rounded-3xl shadow-2xl w-full" />
                                    </div>
                                </div>
                            </section>
                        )}

                        {activeTab === 'edu' && (
                            <div className="max-w-4xl mx-auto py-16 px-4">
                                <h2 className="text-3xl font-black text-center mb-10">質地分級 (IDDSI)</h2>
                                <div className="space-y-4">
                                    {TEXTURE_LEVELS.map(l => (
                                        <div key={l.id} className="bg-white p-6 rounded-xl shadow flex items-center border-l-8 border-green-500">
                                            <div className={`${l.color} text-white w-12 h-12 rounded-lg flex items-center justify-center font-bold text-xl mr-6`}>{l.id}</div>
                                            <div><h4 className="font-bold text-lg">{l.name}</h4><p className="text-gray-500">{l.desc}</p></div>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-12 bg-white p-8 rounded-2xl shadow-lg border border-orange-100">
                                    <h3 className="text-2xl font-bold text-orange-600 mb-4">家庭測試法</h3>
                                    <p className="mb-4"><strong>1. 叉子壓力測試：</strong>用叉子按壓食物，應能輕易壓扁且不彈回。</p>
                                    <p><strong>2. 湯匙傾斜測試：</strong>湯匙傾斜時，食物應能整塊滑落，不黏附。</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'recipe' && (
                            <div className="max-w-6xl mx-auto py-16 px-4">
                                <h2 className="text-3xl font-black text-center mb-12">美味食譜</h2>
                                <div className="grid md:grid-cols-2 gap-8">
                                    <div className="bg-white rounded-3xl overflow-hidden shadow-lg">
                                        <img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=600" className="w-full h-64 object-cover" />
                                        <div className="p-8"><h3 className="text-2xl font-bold mb-4">銀髮舒心燉肉 (IDDSI 6)</h3><button className="w-full py-3 bg-gray-100 rounded-xl font-bold hover:bg-orange-500 hover:text-white transition">查看步驟</button></div>
                                    </div>
                                    <div className="bg-white rounded-3xl overflow-hidden shadow-lg">
                                        <img src="https://images.unsplash.com/photo-1476718406336-bb5a9690ee2a?w=600" className="w-full h-64 object-cover" />
                                        <div className="p-8"><h3 className="text-2xl font-bold mb-4">南瓜濃湯慕斯 (IDDSI 4)</h3><button className="w-full py-3 bg-gray-100 rounded-xl font-bold hover:bg-orange-500 hover:text-white transition">查看步驟</button></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'courses' && (
                            <div className="max-w-6xl mx-auto py-16 px-4">
                                <h2 className="text-3xl font-black text-center mb-12">實體課程</h2>
                                <div className="grid md:grid-cols-2 gap-8">
                                    <div className="bg-orange-50 p-8 rounded-3xl border-2 border-orange-100 shadow-md">
                                        <h3 className="text-2xl font-bold mb-4">質地飲食入門班</h3>
                                        <p className="mb-2 font-bold">2026/05/20 | 台北市</p>
                                        <div className="text-2xl font-black text-orange-600 mb-6">NT$ 1,200</div>
                                        <button className="bg-orange-500 text-white px-6 py-2 rounded-xl font-bold">立即報名</button>
                                    </div>
                                    <div className="bg-orange-50 p-8 rounded-3xl border-2 border-orange-100 shadow-md">
                                        <h3 className="text-2xl font-bold mb-4">IDDSI 分級實作課</h3>
                                        <p className="mb-2 font-bold">2026/06/15 | 線上課程</p>
                                        <div className="text-2xl font-black text-orange-600 mb-6">NT$ 800</div>
                                        <button className="bg-orange-500 text-white px-6 py-2 rounded-xl font-bold">立即報名</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'shop' && (
                            <div className="max-w-3xl mx-auto py-32 px-4 text-center">
                                <div className="bg-white p-12 rounded-[3rem] shadow-xl border-2 border-orange-100">
                                    <h2 className="text-3xl font-black mb-6 text-gray-900">線上商城準備中</h2>
                                    <p className="text-xl text-gray-600 mb-8">專為高齡者選配的輔助餐點即將上線！</p>
                                    <div className="flex gap-2 max-w-sm mx-auto">
                                        <input type="email" placeholder="Email" className="flex-1 border p-3 rounded-lg outline-none focus:border-orange-500" />
                                        <button className="bg-orange-500 text-white px-6 py-3 rounded-lg font-bold">通知我</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 頁尾頁尾頁尾 */}
                    <footer className="bg-gray-800 text-white pt-16 pb-10 mt-20">
                        <div className="max-w-7xl mx-auto px-4 grid md:grid-cols-3 gap-12 border-b border-gray-700 pb-12">
                            <div>
                                <h3 className="text-2xl font-bold mb-4">友膳食嚥家</h3>
                                <p className="text-gray-400">專注於推廣高齡質地飲食，讓每一位長輩都能吃得安全、美味。</p>
                            </div>
                            <div>
                                <h4 className="text-xl font-bold mb-4">快速連結</h4>
                                <ul className="text-gray-400 space-y-2">
                                    <li className="cursor-pointer hover:text-white" onClick={() => setActiveTab('edu')}>質地分級介紹</li>
                                    <li className="cursor-pointer hover:text-white" onClick={() => setActiveTab('recipe')}>美味食譜專區</li>
                                    <li className="cursor-pointer hover:text-white" onClick={() => setActiveTab('courses')}>最新課程資訊</li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="text-xl font-bold mb-4">聯繫我們</h4>
                                <p className="text-gray-400">電話：02-1234-5678</p>
                                <p className="text-gray-400">時間：週一至週五 09:00 - 18:00</p>
                                <div className="flex space-x-4 mt-6">
                                    <div className="bg-green-600 px-3 py-1 rounded-full text-xs font-bold cursor-pointer">LINE</div>
                                    <div className="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold cursor-pointer">FB</div>
                                </div>
                            </div>
                        </div>
                        <p className="text-center mt-10 text-gray-500">© 2026 友膳食嚥家 版權所有</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
