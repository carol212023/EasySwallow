<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友膳食嚥家 - 高齡質地飲食推廣</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            useEffect(() => {
                if (window.lucide) { window.lucide.createIcons(); }
                window.scrollTo(0, 0);
            }, [activeTab, isMenuOpen]);

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col">
                    {/* Navigation */}
                    <nav className="bg-white shadow-md sticky top-0 z-50 h-20 flex items-center">
                        <div className="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
                            <div className="flex items-center cursor-pointer" onClick={() => {setActiveTab('home'); setIsMenuOpen(false);}}>
                                <div className="bg-green-600 p-2 rounded-lg mr-2 text-white"><i data-lucide="utensils" className="w-6 h-6"></i></div>
                                <span className="text-2xl font-bold text-gray-800 tracking-tight">友膳食嚥家</span>
                            </div>
                            <div className="hidden md:flex space-x-8 font-bold">
                                <button onClick={() => setActiveTab('home')} className={activeTab === 'home' ? 'text-green-600' : 'text-gray-500'}>首頁</button>
                                <button onClick={() => setActiveTab('edu')} className={activeTab === 'edu' ? 'text-green-600' : 'text-gray-500'}>衛教知識</button>
                                <button onClick={() => setActiveTab('recipe')} className={activeTab === 'recipe' ? 'text-green-600' : 'text-gray-500'}>美味食譜</button>
                                <button onClick={() => setActiveTab('courses')} className={activeTab === 'courses' ? 'text-green-600' : 'text-gray-500'}>實體課程</button>
                                <button onClick={() => setActiveTab('shop')} className="bg-orange-500 text-white px-6 py-2 rounded-full shadow-md">線上購買</button>
                            </div>
                            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <i data-lucide={isMenuOpen ? "x" : "menu"} className="w-8 h-8 text-gray-600"></i>
                            </button>
                        </div>
                    </nav>

                    {/* 手機選單 */}
                    {isMenuOpen && (
                        <div className="md:hidden bg-white border-b shadow-lg flex flex-col p-6 space-y-4 font-bold">
                            <button onClick={() => {setActiveTab('home'); setIsMenuOpen(false);}} className="text-left">首頁</button>
                            <button onClick={() => {setActiveTab('edu'); setIsMenuOpen(false);}} className="text-left">衛教知識</button>
                            <button onClick={() => {setActiveTab('recipe'); setIsMenuOpen(false);}} className="text-left">美味食譜</button>
                            <button onClick={() => {setActiveTab('courses'); setIsMenuOpen(false);}} className="text-left">實體課程</button>
                            <button onClick={() => {setActiveTab('shop'); setIsMenuOpen(false);}} className="text-orange-500 text-left">線上購買</button>
                        </div>
                    )}

                    <main className="flex-grow">
                        {activeTab === 'home' && (
                            <div>
                                {/* Banner */}
                                <div className="bg-orange-50 py-16 md:py-24">
                                    <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row items-center gap-12">
                                        <div className="md:w-1/2 text-center md:text-left">
                                            <span className="bg-green-100 text-green-700 px-4 py-1 rounded-full font-bold">友善吞嚥 · 幸福入口</span>
                                            <h1 className="text-4xl md:text-6xl font-black mt-6 mb-8 text-gray-900 leading-tight">讓長輩重拾<br/><span className="text-orange-600">「吃」的樂趣</span></h1>
                                            <p className="text-xl text-gray-600 mb-10 leading-relaxed font-medium">我們不只提供食品，更提供專業的質地飲食方案。讓每一口飯菜，都成為尊嚴與健康的享受。</p>
                                            <button onClick={() => setActiveTab('recipe')} className="bg-orange-500 text-white px-10 py-4 rounded-xl font-bold text-xl shadow-lg hover:bg-orange-600 transition">瀏覽精選食譜</button>
                                        </div>
                                        <div className="md:w-1/2">
                                            <img src="https://images.unsplash.com/photo-1516714435131-44d6b64dc6a2?w=800" className="rounded-[3rem] shadow-2xl w-full h-auto object-cover" />
                                        </div>
                                    </div>
                                </div>

                                {/* 重點卡片區 (補回您截圖的部分) */}
                                <div className="max-w-7xl mx-auto py-24 px-4 text-center">
                                    <h2 className="text-4xl font-black text-gray-900 mb-4">我們能為您做什麼？</h2>
                                    <p className="text-xl text-gray-500 mb-16">專業、美味、安全，是我們對質地飲食的堅持</p>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                                        {/* 卡片 1 */}
                                        <div className="bg-white p-10 rounded-[2.5rem] shadow-sm hover:shadow-xl transition-all border-t-8 border-green-500 flex flex-col items-center">
                                            <div className="bg-green-50 w-20 h-20 rounded-full flex items-center justify-center mb-8">
                                                <i data-lucide="graduation-cap" className="text-green-600 w-10 h-10"></i>
                                            </div>
                                            <h3 className="text-2xl font-bold mb-4">專業實體課程</h3>
                                            <p className="text-gray-500 leading-relaxed text-lg mb-8">針對照顧者與長輩，教授如何正確調整食材質地，讓家常菜也能變身好吞口。</p>
                                            <button onClick={() => setActiveTab('courses')} className="text-green-600 font-bold flex items-center text-lg">了解更多 <i data-lucide="chevron-right" className="ml-1 w-5 h-5"></i></button>
                                        </div>

                                        {/* 卡片 2 */}
                                        <div className="bg-white p-10 rounded-[2.5rem] shadow-sm hover:shadow-xl transition-all border-t-8 border-orange-500 flex flex-col items-center">
                                            <div className="bg-orange-50 w-20 h-20 rounded-full flex items-center justify-center mb-8">
                                                <i data-lucide="utensils" className="text-orange-600 w-10 h-10"></i>
                                            </div>
                                            <h3 className="text-2xl font-bold mb-4">現成營養食譜</h3>
                                            <p className="text-gray-500 leading-relaxed text-lg mb-8">符合 IDDSI 國際標準的精選食譜，美味與營養兼具，步驟簡單好上手。</p>
                                            <button onClick={() => setActiveTab('recipe')} className="text-orange-600 font-bold flex items-center text-lg">瀏覽食譜 <i data-lucide="chevron-right" className="ml-1 w-5 h-5"></i></button>
                                        </div>

                                        {/* 卡片 3 */}
                                        <div className="bg-white p-10 rounded-[2.5rem] shadow-sm hover:shadow-xl transition-all border-t-8 border-blue-500 flex flex-col items-center">
                                            <div className="bg-blue-50 w-20 h-20 rounded-full flex items-center justify-center mb-8">
                                                <i data-lucide="shopping-bag" className="text-blue-600 w-10 h-10"></i>
                                            </div>
                                            <h3 className="text-2xl font-bold mb-4">質地友善食品</h3>
                                            <p className="text-gray-500 leading-relaxed text-lg mb-8">嚴選現成食品，開袋即食。解決忙碌照顧者的煩惱，讓長輩餐餐期待。</p>
                                            <button onClick={() => setActiveTab('shop')} className="text-blue-600 font-bold flex items-center text-lg">立即購買 <i data-lucide="chevron-right" className="ml-1 w-5 h-5"></i></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'edu' && (
                            <div className="max-w-4xl mx-auto py-20 px-4">
                                <h2 className="text-3xl font-black text-center mb-12">認識質地分級 (IDDSI)</h2>
                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-blue-400">
                                        <h4 className="text-xl font-bold mb-2">第 6 級：軟質易製</h4>
                                        <p className="text-gray-500">可用叉子壓斷，顆粒不超過 1.5 公分。</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-green-500">
                                        <h4 className="text-xl font-bold mb-2">第 4 級：泥狀飲食</h4>
                                        <p className="text-gray-500">滑順無顆粒，不需咀嚼，適合嚴重吞嚥障礙者。</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'recipe' && (
                            <div className="max-w-7xl mx-auto py-20 px-4 grid md:grid-cols-2 gap-12 text-center">
                                <h2 className="text-3xl font-black md:col-span-2 mb-8">美味食譜推薦</h2>
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-lg border border-gray-100">
                                    <img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=600" className="w-full h-72 object-cover" />
                                    <div className="p-8"><h3 className="text-2xl font-bold mb-6 text-gray-800 font-bold">銀髮舒心燉肉 (IDDSI 6)</h3><button className="w-full py-4 bg-gray-50 rounded-xl font-bold">查看教學</button></div>
                                </div>
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-lg border border-gray-100">
                                    <img src="https://images.unsplash.com/photo-1476718406336-bb5a9690ee2a?w=600" className="w-full h-72 object-cover" />
                                    <div className="p-8"><h3 className="text-2xl font-bold mb-6 text-gray-800 font-bold">南瓜濃湯慕斯 (IDDSI 4)</h3><button className="w-full py-4 bg-gray-50 rounded-xl font-bold">查看教學</button></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'courses' && (
                            <div className="max-w-7xl mx-auto py-20 px-4 text-center">
                                <h2 className="text-3xl font-black mb-16">實體課程資訊</h2>
                                <div className="bg-orange-50 p-12 rounded-[3rem] border-2 border-orange-100 max-w-2xl mx-auto shadow-sm">
                                    <h3 className="text-2xl font-bold mb-4 tracking-wide">質地飲食入門班：在家也能做美味</h3>
                                    <p className="text-gray-600 mb-6 font-bold text-lg">2026/05/20 | 台北市大安區</p>
                                    <div className="text-3xl font-black text-orange-600 mb-8">NT$ 1,200</div>
                                    <button className="bg-orange-500 text-white px-12 py-4 rounded-2xl font-bold text-xl">立即報名</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'shop' && (
                            <div className="max-w-4xl mx-auto py-32 px-4 text-center flex items-center justify-center">
                                <div className="bg-white p-20 rounded-[3rem] shadow-xl border-2 border-orange-100">
                                    <i data-lucide="shopping-bag" className="w-20 h-20 text-orange-400 mx-auto mb-8"></i>
                                    <h2 className="text-4xl font-black mb-6">線上商城籌備中</h2>
                                    <p className="text-xl text-gray-600 mb-10">我們將提供嚴選的 IDDSI 認證產品，敬請期待！</p>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-gray-800 text-white pt-16 pb-12 mt-20">
                        <div className="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-12 border-b border-gray-700 pb-16 text-center md:text-left">
                            <div>
                                <h3 className="text-2xl font-bold mb-6 text-green-400">友膳食嚥家</h3>
                                <p className="text-gray-400 text-lg leading-relaxed">專注於推廣高齡質地飲食，我們致力於讓每一位長輩都能吃得安全、營養、更要美味。</p>
                            </div>
                            <div>
                                <h4 className="text-xl font-bold mb-6">快速連結</h4>
                                <ul className="space-y-4 text-lg text-gray-400">
                                    <li className="hover:text-white cursor-pointer transition" onClick={() => setActiveTab('edu')}>質地分級介紹</li>
                                    <li className="hover:text-white cursor-pointer transition" onClick={() => setActiveTab('recipe')}>美味食譜專區</li>
                                    <li className="hover:text-white cursor-pointer transition" onClick={() => setActiveTab('courses')}>最新課程資訊</li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="text-xl font-bold mb-6 text-orange-400">聯繫我們</h4>
                                <div className="space-y-4 text-lg text-gray-400">
                                    <p>電話：02-1234-5678</p>
                                    <p>服務時間：週一至週五 09:00 - 18:00</p>
                                    <div className="flex justify-center md:justify-start space-x-6 mt-8 font-bold">
                                        <span className="cursor-pointer bg-green-600 px-4 py-1 rounded-full text-sm">LINE</span>
                                        <span className="cursor-pointer bg-blue-600 px-4 py-1 rounded-full text-sm">FB</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <p className="mt-12 text-center text-gray-500 font-medium tracking-widest">© 2026 友膳食嚥家 版權所有</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
