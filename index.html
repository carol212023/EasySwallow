<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友膳食嚥家 - 高齡質地飲食推廣</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab, isMenuOpen]);

            const TEXTURE_LEVELS = [
                { id: 7, name: '普通飲食', color: 'bg-black', desc: '不限質地' },
                { id: 6, name: '軟質易製', color: 'bg-blue-400', desc: '可用叉子輕易壓斷' },
                { id: 5, name: '細碎及濕軟', color: 'bg-orange-400', desc: '米粒大小，不需咀嚼' },
                { id: 4, name: '泥狀飲食', color: 'bg-green-500', desc: '像馬鈴薯泥，無顆粒' },
            ];

            const RECIPES = [
                { title: "銀髮舒心燉肉 (IDDSI 6)", tag: "高蛋白", img: "https://images.unsplash.com/photo-1547592166-23ac45744acd?w=800" },
                { title: "南瓜濃湯慕斯 (IDDSI 4)", tag: "好吞嚥", img: "https://images.unsplash.com/photo-1476718406336-bb5a9690ee2a?w=800" }
            ];

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col">
                    {/* Navigation */}
                    <nav className="bg-white shadow-md sticky top-0 z-50 h-20 flex items-center">
                        <div className="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
                            <div className="flex items-center cursor-pointer" onClick={() => {setActiveTab('home'); setIsMenuOpen(false);}}>
                                <div className="bg-green-600 p-2 rounded-lg mr-2">
                                    <i data-lucide="utensils" className="text-white w-6 h-6"></i>
                                </div>
                                <span className="text-2xl font-bold text-gray-800 tracking-tight">友膳食嚥家</span>
                            </div>

                            <div className="hidden md:flex items-center space-x-8 font-medium">
                                <button onClick={() => setActiveTab('home')} className={`text-lg transition ${activeTab === 'home' ? 'text-green-600' : 'text-gray-600 hover:text-green-600'}`}>首頁</button>
                                <button onClick={() => setActiveTab('edu')} className={`text-lg transition ${activeTab === 'edu' ? 'text-green-600' : 'text-gray-600 hover:text-green-600'}`}>衛教知識</button>
                                <button onClick={() => setActiveTab('recipe')} className={`text-lg transition ${activeTab === 'recipe' ? 'text-green-600' : 'text-gray-600 hover:text-green-600'}`}>美味食譜</button>
                                <button onClick={() => setActiveTab('shop')} className="bg-orange-500 text-white px-6 py-2 rounded-full font-bold hover:bg-orange-600 shadow-md transition">線上購買</button>
                            </div>

                            <button className="md:hidden text-gray-600" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <i data-lucide={isMenuOpen ? "x" : "menu"} className="w-8 h-8"></i>
                            </button>
                        </div>

                        {isMenuOpen && (
                            <div className="absolute top-20 left-0 w-full bg-white border-t border-gray-100 shadow-xl md:hidden">
                                <div className="flex flex-col p-4 space-y-2">
                                    <button onClick={() => {setActiveTab('home'); setIsMenuOpen(false);}} className="p-4 text-xl border-b text-left">首頁</button>
                                    <button onClick={() => {setActiveTab('edu'); setIsMenuOpen(false);}} className="p-4 text-xl border-b text-left">衛教知識</button>
                                    <button onClick={() => {setActiveTab('recipe'); setIsMenuOpen(false);}} className="p-4 text-xl border-b text-left">美味食譜</button>
                                    <button onClick={() => {setActiveTab('shop'); setIsMenuOpen(false);}} className="m-4 bg-orange-500 text-white py-4 rounded-xl font-bold text-center">線上購買</button>
                                </div>
                            </div>
                        )}
                    </nav>

                    {/* Main Content */}
                    <main className="flex-grow">
                        {activeTab === 'home' && (
                            <div>
                                <div className="bg-orange-50 py-16 md:py-24">
                                    <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row items-center gap-12">
                                        <div className="md:w-1/2 text-center md:text-left">
                                            <span className="bg-green-100 text-green-700 px-4 py-1 rounded-full font-bold">友善吞嚥 · 幸福入口</span>
                                            <h1 className="text-4xl md:text-6xl font-black mt-6 mb-8 text-gray-900 leading-tight">讓長輩重拾<br/><span className="text-orange-600">「吃」的樂趣</span></h1>
                                            <p className="text-xl text-gray-600 mb-10 leading-relaxed">專業個案管理師打造的質地飲食方案，讓每一口飯菜都成為尊嚴與健康的享受。</p>
                                            <button onClick={() => setActiveTab('recipe')} className="bg-orange-500 text-white px-10 py-4 rounded-xl font-bold text-xl shadow-lg hover:bg-orange-600 transition">瀏覽精選食譜</button>
                                        </div>
                                        <div className="md:w-1/2">
                                            <img src="https://images.unsplash.com/photo-1516714435131-44d6b64dc6a2?w=800" className="rounded-3xl shadow-2xl w-full object-cover h-96 md:h-auto" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'edu' && (
                            <div className="max-w-4xl mx-auto py-16 px-4">
                                <h2 className="text-4xl font-black text-center mb-16 text-gray-900 font-bold">認識質地分級 (IDDSI)</h2>
                                <div className="space-y-6">
                                    {TEXTURE_LEVELS.map(l => (
                                        <div key={l.id} className="bg-white p-6 rounded-2xl shadow-sm flex items-center border-l-8 border-green-500">
                                            <div className={`${l.color} text-white w-12 h-12 rounded-xl flex items-center justify-center font-bold text-2xl mr-6`}>{l.id}</div>
                                            <div className="flex-1">
                                                <h4 className="text-2xl font-bold text-gray-800 mb-1">{l.name}</h4>
                                                <p className="text-gray-500 text-lg">{l.desc}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'recipe' && (
                            <div className="max-w-7xl mx-auto py-16 px-4">
                                <h2 className="text-4xl font-black text-center mb-16 text-gray-900 font-bold">美味食譜專區</h2>
                                <div className="grid md:grid-cols-2 gap-12">
                                    {RECIPES.map((r, i) => (
                                        <div key={i} className="bg-white rounded-3xl overflow-hidden shadow-lg border border-gray-100 group">
                                            <div className="h-72 overflow-hidden"><img src={r.img} className="w-full h-full object-cover group-hover:scale-105 transition duration-500" /></div>
                                            <div className="p-8">
                                                <span className="text-orange-600 font-bold uppercase tracking-wider text-sm">#{r.tag}</span>
                                                <h3 className="text-2xl font-bold mt-2 mb-6 text-gray-800">{r.title}</h3>
                                                <button className="w-full py-4 bg-gray-50 rounded-xl font-bold text-lg hover:bg-orange-500 hover:text-white transition">查看詳細步驟</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'shop' && (
                            <div className="max-w-4xl mx-auto py-20 px-4 text-center">
                                <div className="bg-white p-12 md:p-20 rounded-[3rem] shadow-xl border-2 border-orange-100">
                                    <div className="bg-orange-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 text-orange-500">
                                        <i data-lucide="shopping-bag" className="w-12 h-12"></i>
                                    </div>
                                    <h2 className="text-4xl font-bold mb-6 text-gray-900">商城準備中</h2>
                                    <p className="text-xl text-gray-600 mb-10 leading-relaxed font-medium">我們正嚴選優質質地友善產品，<br/>即將為您帶來更便利的照護體驗！</p>
                                    <div className="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
                                        <input type="email" placeholder="您的電子信箱" className="flex-1 p-4 border-2 border-gray-100 rounded-xl outline-none focus:border-orange-500 transition" />
                                        <button className="bg-orange-500 text-white px-8 py-4 rounded-xl font-bold hover:bg-orange-600 shadow-md transition">訂閱</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer - 您要求的資訊都在這 */}
                    <footer className="bg-gray-800 text-white pt-16 pb-12 mt-20">
                        <div className="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-12 border-b border-gray-700 pb-16">
                            <div>
                                <h3 className="text-2xl font-bold mb-6">友膳食嚥家</h3>
                                <p className="text-gray-400 text-lg leading-relaxed mb-6">
                                    專注於推廣高齡質地飲食，我們致力於讓每一位長輩都能吃得安全、營養、更要美味。
                                </p>
                            </div>
                            <div>
                                <h4 className="text-xl font-bold mb-6">快速連結</h4>
                                <ul className="space-y-4 text-lg text-gray-400">
                                    <li className="hover:text-white cursor-pointer transition" onClick={() => setActiveTab('edu')}>質地分級介紹</li>
                                    <li className="hover:text-white cursor-pointer transition" onClick={() => setActiveTab('recipe')}>精選食譜專區</li>
                                    <li className="hover:text-white cursor-pointer transition">關於我們</li>
                                    <li className="hover:text-white cursor-pointer transition">個案管理服務</li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="text-xl font-bold mb-6">聯繫我們</h4>
                                <div className="space-y-4 text-lg text-gray-400">
                                    <div className="flex items-center">
                                        <i data-lucide="phone" className="text-green-500 mr-3 w-5 h-5"></i>
                                        <span>02-1234-5678</span>
                                    </div>
                                    <p>服務時間：週一至週五 09:00 - 18:00</p>
                                    <div className="flex space-x-6 mt-8">
                                        <div className="bg-green-600 p-2 rounded-full cursor-pointer hover:bg-green-500 transition">
                                            <span className="font-bold text-sm px-1">LINE</span>
                                        </div>
                                        <div className="bg-blue-600 p-2 rounded-full cursor-pointer hover:bg-blue-500 transition">
                                            <span className="font-bold text-sm px-1">FB</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="mt-12 text-center text-gray-500 font-medium">
                            <p>© 2026 友膳食嚥家 版權所有</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
