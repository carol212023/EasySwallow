<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友膳食嚥家 - 高齡質地飲食推廣</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            useEffect(() => {
                if (window.lucide) { window.lucide.createIcons(); }
                window.scrollTo(0, 0);
            }, [activeTab, isMenuOpen]);

            const TEXTURE_LEVELS = [
                { id: 7, name: '普通飲食', color: 'bg-black', desc: '不限質地' },
                { id: 6, name: '軟質易製', color: 'bg-blue-500', desc: '可用叉子輕易壓斷' },
                { id: 5, name: '細碎及濕軟', color: 'bg-orange-500', desc: '米粒大小，不需咀嚼' },
                { id: 4, name: '泥狀飲食', color: 'bg-green-500', desc: '像馬鈴薯泥，無顆粒' },
            ];

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col">
                    {/* Navigation */}
                    <nav className="bg-white shadow-md sticky top-0 z-50 h-20 flex items-center">
                        <div className="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
                            <div className="flex items-center cursor-pointer" onClick={() => {setActiveTab('home'); setIsMenuOpen(false);}}>
                                <div className="bg-green-600 p-2 rounded-lg mr-2 text-white"><i data-lucide="utensils" className="w-6 h-6"></i></div>
                                <span className="text-2xl font-bold text-gray-800 tracking-tight">友膳食嚥家</span>
                            </div>
                            <div className="hidden md:flex space-x-8 font-bold">
                                <button onClick={() => setActiveTab('home')} className={activeTab === 'home' ? 'text-green-600' : 'text-gray-500 hover:text-green-600'}>首頁</button>
                                <button onClick={() => setActiveTab('edu')} className={activeTab === 'edu' ? 'text-green-600' : 'text-gray-500 hover:text-green-600'}>衛教知識</button>
                                <button onClick={() => setActiveTab('recipe')} className={activeTab === 'recipe' ? 'text-green-600' : 'text-gray-500 hover:text-green-600'}>美味食譜</button>
                                <button onClick={() => setActiveTab('courses')} className={activeTab === 'courses' ? 'text-green-600' : 'text-gray-500 hover:text-green-600'}>實體課程</button>
                                <button onClick={() => setActiveTab('shop')} className="bg-orange-500 text-white px-6 py-2 rounded-full shadow-md">線上購買</button>
                            </div>
                            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <i data-lucide={isMenuOpen ? "x" : "menu"} className="w-8 h-8 text-gray-600"></i>
                            </button>
                        </div>
                    </nav>

                    {/* 手機選單 */}
                    {isMenuOpen && (
                        <div className="md:hidden bg-white border-b shadow-lg flex flex-col p-6 space-y-4 font-bold">
                            <button onClick={() => {setActiveTab('home'); setIsMenuOpen(false);}} className="text-left">首頁</button>
                            <button onClick={() => {setActiveTab('edu'); setIsMenuOpen(false);}} className="text-left">衛教知識</button>
                            <button onClick={() => {setActiveTab('recipe'); setIsMenuOpen(false);}} className="text-left">美味食譜</button>
                            <button onClick={() => {setActiveTab('courses'); setIsMenuOpen(false);}} className="text-left">實體課程</button>
                            <button onClick={() => {setActiveTab('shop'); setIsMenuOpen(false);}} className="text-orange-500 text-left">線上購買</button>
                        </div>
                    )}

                    <main className="flex-grow">
                        {activeTab === 'home' && (
                            <div>
                                {/* Banner */}
                                <div className="bg-orange-50 py-16 md:py-24">
                                    <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row items-center gap-12">
                                        <div className="md:w-1/2 text-center md:text-left">
                                            <span className="bg-green-100 text-green-700 px-4 py-1 rounded-full font-bold">友善吞嚥 · 幸福入口</span>
                                            <h1 className="text-4xl md:text-6xl font-black mt-6 mb-8 text-gray-900 leading-tight">讓長輩重拾<br/><span className="text-orange-600">「吃」的樂趣</span></h1>
                                            <p className="text-xl text-gray-600 mb-10 leading-relaxed font-medium">我們不只提供食品，更提供專業的質地飲食方案。讓每一口飯菜，都成為尊嚴與健康的享受。</p>
                                            <button onClick={() => setActiveTab('recipe')} className="bg-orange-500 text-white px-10 py-4 rounded-xl font-bold text-xl shadow-lg hover:bg-orange-600 transition">瀏覽精選食譜</button>
                                        </div>
                                        <div className="md:w-1/2">
                                            <img src="https://images.unsplash.com/photo-1516714435131-44d6b64dc6a2?w=800" className="rounded-[3rem] shadow-2xl w-full h-auto object-cover" />
                                        </div>
                                    </div>
                                </div>

                                {/* 我們能為您做什麼？ (三大特色卡片) */}
                                <div className="max-w-7xl mx-auto py-20 px-4 text-center">
                                    <h2 className="text-4xl font-black text-gray-900 mb-4">我們能為您做什麼？</h2>
                                    <p className="text-xl text-gray-500 mb-16 font-medium">專業、美味、安全，是我們對質地飲食的堅持</p>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                                        <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border-t-8 border-green-500 flex flex-col items-center">
                                            <div className="bg-green-50 w-20 h-20 rounded-full flex items-center justify-center mb-8"><i data-lucide="graduation-cap" className="text-green-600 w-10 h-10"></i></div>
                                            <h3 className="text-2xl font-bold mb-4">專業實體課程</h3>
                                            <p className="text-gray-500 leading-relaxed text-lg mb-8 font-medium">針對照顧者與長輩，教授如何正確調整食材質地，讓家常菜也能變身好吞口。</p>
                                            <button onClick={() => setActiveTab('courses')} className="text-green-600 font-bold flex items-center text-lg">了解更多 <i data-lucide="chevron-right" className="ml-1 w-5 h-5"></i></button>
                                        </div>
                                        <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border-t-8 border-orange-500 flex flex-col items-center">
                                            <div className="bg-orange-50 w-20 h-20 rounded-full flex items-center justify-center mb-8"><i data-lucide="utensils" className="text-orange-600 w-10 h-10"></i></div>
                                            <h3 className="text-2xl font-bold mb-4">現成營養食譜</h3>
                                            <p className="text-gray-500 leading-relaxed text-lg mb-8 font-medium">符合 IDDSI 國際標準的精選食譜，美味與營養兼具，步驟簡單好上手。</p>
                                            <button onClick={() => setActiveTab('recipe')} className="text-orange-600 font-bold flex items-center text-lg">瀏覽食譜 <i data-lucide="chevron-right" className="ml-1 w-5 h-5"></i></button>
                                        </div>
                                        <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border-t-8 border-blue-500 flex flex-col items-center">
                                            <div className="bg-blue-50 w-20 h-20 rounded-full flex items-center justify-center mb-8"><i data-lucide="shopping-bag" className="text-blue-600 w-10 h-10"></i></div>
                                            <h3 className="text-2xl font-bold mb-4">質地友善食品</h3>
                                            <p className="text-gray-500 leading-relaxed text-lg mb-8 font-medium">嚴選現成食品，開袋即食。解決忙碌照顧者的煩惱，讓長輩餐餐期待。</p>
                                            <button onClick={() => setActiveTab('shop')} className="text-blue-600 font-bold flex items-center text-lg">立即購買 <i data-lucide="chevron-right" className="ml-1 w-5 h-5"></i></button>
                                        </div>
                                    </div>
                                </div>

                                {/* 認識質地分級 (IDDSI) 區塊 (補回截圖中的部分) */}
                                <div className="bg-gray-100 py-20 px-4">
                                    <div className="max-w-7xl mx-auto flex flex-col lg:flex-row items-center gap-16">
                                        <div className="lg:w-1/2">
                                            <h2 className="text-4xl font-black text-gray-900 mb-6">認識質地分級 (IDDSI)</h2>
                                            <p className="text-xl text-gray-600 mb-10 leading-relaxed">不同的吞嚥困難程度需要不同質地的食物。我們依據國際 IDDSI 分級，為您提供最精確的分類建議。</p>
                                            <div className="space-y-4">
                                                {TEXTURE_LEVELS.map(level => (
                                                    <div key={level.id} className="bg-white p-6 rounded-2xl shadow-sm flex items-center">
                                                        <div className={`${level.color} text-white w-12 h-12 rounded-lg flex items-center justify-center font-bold text-xl mr-6`}>{level.id}</div>
                                                        <div>
                                                            <h4 className="text-xl font-bold text-gray-800">{level.name}</h4>
                                                            <p className="text-gray-500 text-lg font-medium">{level.desc}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={() => setActiveTab('edu')} className="mt-10 bg-green-600 text-white px-8 py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-green-700">查看完整衛教手冊</button>
                                        </div>
                                        <div className="lg:w-1/2 relative">
                                            <div className="bg-white p-4 rounded-3xl shadow-2xl relative z-10">
                                                <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=800" className="rounded-2xl w-full h-[450px] object-cover" />
                                                <div className="absolute -bottom-8 -left-8 bg-orange-600 text-white p-8 rounded-3xl shadow-xl max-w-xs">
                                                    <p className="text-2xl font-black mb-2">"軟質不等於糊爛"</p>
                                                    <p className="text-lg opacity-90 font-medium">我們堅持食物原味與美感</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 其他分頁內容保持不變... */}
                        {activeTab === 'edu' && (
                            <div className="max-w-4xl mx-auto py-20 px-4">
                                <h2 className="text-4xl font-black text-center mb-16">衛教知識與測試方法</h2>
                                <div className="space-y-12">
                                    <div className="bg-white p-10 rounded-3xl shadow-sm border-l-8 border-orange-500">
                                        <h3 className="text-2xl font-bold mb-6 flex items-center"><i data-lucide="check-circle" className="mr-3 text-orange-500"></i> 叉子壓力測試</h3>
                                        <p className="text-xl text-gray-600 leading-relaxed">用叉子背面按壓食物，應能輕易壓扁且不彈回，觀察叉子抬起時食物不會黏附在叉齒上。</p>
                                    </div>
                                    <div className="bg-white p-10 rounded-3xl shadow-sm border-l-8 border-blue-500">
                                        <h3 className="text-2xl font-bold mb-6 flex items-center"><i data-lucide="check-circle" className="mr-3 text-blue-500"></i> 湯匙傾斜測試</h3>
                                        <p className="text-xl text-gray-600 leading-relaxed">傾斜湯匙，觀察泥狀食物是否能成塊滑落，不應在湯匙上留下明顯殘渣。</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'recipe' && (
                            <div className="max-w-7xl mx-auto py-20 px-4">
                                <h2 className="text-4xl font-black text-center mb-16 font-bold">美味食譜專區</h2>
                                <div className="grid md:grid-cols-2 gap-12">
                                    <div className="bg-white rounded-[2.5rem] overflow-hidden shadow-lg border border-gray-100">
                                        <img src="https://images.unsplash.com/photo-1547592166-23ac45744acd?w=600" className="w-full h-80 object-cover" />
                                        <div className="p-10"><h3 className="text-3xl font-bold mb-6 text-gray-800">銀髮舒心燉肉 (IDDSI 6)</h3><button className="w-full py-4 bg-gray-100 rounded-2xl font-bold text-xl hover:bg-orange-500 hover:text-white transition">查看食譜</button></div>
                                    </div>
                                    <div className="bg-white rounded-[2.5rem] overflow-hidden shadow-lg border border-gray-100">
                                        <img src="https://images.unsplash.com/photo-1476718406336-bb5a9690ee2a?w=600" className="w-full h-80 object-cover" />
                                        <div className="p-10"><h3 className="text-3xl font-bold mb-6 text-gray-800">南瓜濃湯慕斯 (IDDSI 4)</h3><button className="w-full py-4 bg-gray-100 rounded-2xl font-bold text-xl hover:bg-orange-500 hover:text-white transition">查看食譜</button></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'courses' && (
                            <div className="max-w-7xl mx-auto py-20 px-4">
                                <h2 className="text-4xl font-black text-center mb-16 font-bold">實體課程預約</h2>
                                <div className="bg-orange-50 p-12 rounded-[3rem] border-2 border-orange-100 max-w-2xl mx-auto shadow-sm text-center">
                                    <h3 className="text-3xl font-bold mb-6 tracking-tight">質地飲食入門班：在家也能做美味</h3>
                                    <p className="text-xl text-gray-600 mb-8 font-bold underline decoration-orange-300">2026/05/20 | 台北市大安區</p>
                                    <div className="text-4xl font-black text-orange-600 mb-10 tracking-widest">NT$ 1,200</div>
                                    <button className="bg-orange-500 text-white px-12 py-5 rounded-2xl font-bold text-2xl shadow-xl hover:bg-orange-600">立即報名</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'shop' && (
                            <div className="max-w-4xl mx-auto py-32 px-4 text-center">
                                <div className="bg-white p-20 rounded-[4rem] shadow-xl border-2 border-orange-100">
                                    <div className="bg-orange-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-10"><i data-lucide="shopping-bag" className="w-12 h-12 text-orange-600"></i></div>
                                    <h2 className="text-4xl font-black mb-6">商城準備中</h2>
                                    <p className="text-xl text-gray-600 mb-12 font-medium leading-relaxed">我們正在嚴選最適合長輩的輔助品，<br/>即將上線，敬請期待！</p>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-gray-800 text-white pt-20 pb-12 mt-20">
                        <div className="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-16 border-b border-gray-700 pb-20 text-center md:text-left">
                            <div><h3 className="text-2xl font-bold mb-6 text-green-400 font-black">友膳食嚥家</h3><p className="text-gray-400 text-lg leading-relaxed font-medium">專注於推廣高齡質地飲食，讓每一位長輩都能吃得安全、營養、更要美味。</p></div>
                            <div><h4 className="text-xl font-bold mb-6">快速連結</h4><ul className="space-y-4 text-lg text-gray-400 font-medium"><li className="hover:text-white cursor-pointer" onClick={() => setActiveTab('edu')}>質地分級介紹</li><li className="hover:text-white cursor-pointer" onClick={() => setActiveTab('recipe')}>精選食譜專區</li><li className="hover:text-white cursor-pointer" onClick={() => setActiveTab('courses')}>最新課程資訊</li></ul></div>
                            <div><h4 className="text-xl font-bold mb-6 text-orange-400">聯繫我們</h4><div className="space-y-4 text-lg text-gray-400 font-medium"><p>電話：02-1234-5678</p><p>時間：週一至週五 09:00 - 18:00</p><div className="flex justify-center md:justify-start space-x-6 mt-10"><span className="bg-green-600 px-5 py-2 rounded-full font-bold text-sm cursor-pointer hover:bg-green-500">LINE</span><span className="bg-blue-600 px-5 py-2 rounded-full font-bold text-sm cursor-pointer hover:bg-blue-500">FB</span></div></div></div>
                        </div>
                        <p className="mt-12 text-center text-gray-500 font-bold tracking-widest leading-loose">© 2026 友膳食嚥家 版權所有</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
